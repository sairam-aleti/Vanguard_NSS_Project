# Vanguard Logistics — vsftpd Configuration
# Chroot jail prevents directory traversal beyond home directory
# Install: sudo cp vsftpd.conf /etc/vsftpd.conf && sudo systemctl restart vsftpd

# Disable anonymous uploads
anonymous_enable=NO
local_enable=YES
write_enable=YES

# Chroot jail — CRITICAL for security
chroot_local_user=YES
allow_writeable_chroot=YES

# Restrict users to their home directories
user_sub_token=$USER
local_root=/home/$USER/ftp

# Passive mode configuration
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=50000

# Logging
xferlog_enable=YES
xferlog_std_format=NO
log_ftp_protocol=YES
vsftpd_log_file=/var/log/vsftpd.log

# Security
tcp_wrappers=YES
hide_ids=YES
use_localtime=YES

# Limit connections
max_clients=10
max_per_ip=3
